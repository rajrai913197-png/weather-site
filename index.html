<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather site</title>
    <link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div id="main-div">
       
        <div id="weather-main-div">
          <div id="div-para">
          <h2 id="weather-head"> Your City, Your Weather</h2>
          <p>Get the latest weather info</p>
          </div>
          <div id="nav-bar">  
           <input type="text" id="inpbtn" placeholder="Enter your city" >
           <button id="submit-btn" onclick="button()" ><i class="fa-solid fa-magnifying-glass"></i></button>
          </div>
          <div id="div-info">
            <div id="main-info">
              <div id="div-city" style="padding-bottom: 5px;">
              <div style="display: flex; align-items: center; gap:  5px;">
               <h5 style="font-size: 15px;  font-weight: 500;font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;">City Name - :</h5>
               <p id="home">----</p>
              </div>
              <h5  id="mosam"  style="font-size: 15px; font-weight: 600; font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif; color: rgb(254, 254, 255); ">Current Weather -</h5>
              <div>
                <h1 id="main-deg">28&deg;C</h1>
                <div style="display: flex; align-items: center; gap: 5px;">
                  <h5 style="font-size: 15px;  font-weight: 500;font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;">Feels like - :</h5>
                  <h5 id="feel">30&deg;C</h5>
                </div>
              </div>
             </div>
               <img src="./cloudy.png" alt="weatherimg" id="main-bg">
            </div>
          
          </div>
    </div>
    <script src="logic.js"></script>
</body>
</html>
