<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather site</title>
    <link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div id="main-div">
       
        <div id="weather-main-div">
          <div id="div-para">
          <h2 id="weather-head"> Your City, Your Weather</h2>
          <p>Get the latest weather info</p>
          </div>
          <div id="nav-bar">  
           <input type="text" id="inpbtn" placeholder="Enter your city">
           <button id="submit-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
          </div>
          <!-- info -->
          <div id="div-info">
            <div  id="time-info">
               <h2 id="div-city">New Delhi , India</h2>
               <div style="display: flex; gap: 5px; font-size:x-small; color: white;">
                 <p>21 May, 2026 </p>
                 <p>10:30 AM </p>
               </div>
             <h1 id="deg-div">28&deg;C</h1>
             </div>
           
             <div>
                
             </div>
          </div>

        </div>
    </div>
</body>
</html>
